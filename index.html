  <script type="text/babel">

    // ── Default data ────────────────────────────────────────
    const CAT_ORDER = ["Middag", "Bakst", "Drikker"];

    // ── Image storage helpers ───────────────────────────────
    // Images are stored in a per-recipe Firestore subcollection (kokeboker/{uid}/images/{recipeId})
    // so they don't count against the ~1 MB limit of the single main document.
    // In React state a recipe keeps `image` (base64); on the wire the main doc only
    // carries `hasImage:true`, and the bytes live in their own image document.
    const stripImages = (d) => {
      const out = {};
      Object.keys(d).forEach(cat => {
        const c = d[cat];
        const subcategories = {};
        Object.keys(c.subcategories).forEach(sub => {
          subcategories[sub] = c.subcategories[sub].map(r => {
            const { image, hasImage, ...rest } = r;
            // Keep the reference if the recipe has an image OR is known to have one
            // on the server whose bytes just aren't loaded into memory yet.
            return (image || hasImage) ? { ...rest, hasImage:true } : rest;
          });
        });
        out[cat] = { ...c, subcategories };
      });
      return out;
    };
    const collectImages = (d) => {
      const map = {};
      Object.keys(d).forEach(cat => Object.values(d[cat].subcategories).forEach(list =>
        list.forEach(r => { if (r.image) map[String(r.id)] = r.image; })));
      return map;
    };
    const mergeImages = (d, imgMap) => {
      const out = {};
      Object.keys(d).forEach(cat => {
        const c = d[cat];
        const subcategories = {};
        Object.keys(c.subcategories).forEach(sub => {
          subcategories[sub] = c.subcategories[sub].map(r => {
            if (!r.hasImage) return r;
            // Keep hasImage in memory so a save can't accidentally drop the reference
            // when the bytes failed to load. image is null until/unless fetched.
            return { ...r, image: imgMap[String(r.id)] || null };
          });
        });
        out[cat] = { ...c, subcategories };
      });
      return out;
    };

    // ── Theme ───────────────────────────────────────────────
    const C = {
      bg:"#efefef", white:"#f8f8f8", warmGray:"#e8e0d6",
      ink:"#1c1410", inkLight:"#6b5c4e", terra:"#c45c2e", red:"#c0392b",
    };
    const NEU_UP   = "6px 6px 14px rgba(0,0,0,0.13), -4px -4px 10px rgba(255,255,255,0.85)";
    const NEU_DOWN = "inset 3px 3px 7px rgba(0,0,0,0.10), inset -3px -3px 7px rgba(255,255,255,0.80)";
    const FF = "'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif";
    const sans  = (o) => ({ fontFamily: FF, ...o });
    const serif = (o) => ({ fontFamily: "'Georgia','Times New Roman',serif", ...o });

    // ── Notch ───────────────────────────────────────────────
    const NOTCH_H = 28, CORNER_R = 14;
    function NotchMarker({ topPx, bg }) {
      return (
        <div style={{ position:"absolute", right:0, top:topPx, display:"flex", flexDirection:"column",
          alignItems:"flex-end", pointerEvents:"none", transition:"top 0.38s cubic-bezier(0.4,0,0.2,1)", zIndex:5 }}>
          <div style={{ width:CORNER_R, height:CORNER_R, background:"transparent", borderBottomRightRadius:CORNER_R,
            boxShadow:`${CORNER_R/2}px ${CORNER_R/2}px 0 ${CORNER_R/2}px ${bg}`,
            filter:"drop-shadow(-2px -2px 4px rgba(0,0,0,0.12))" }} />
          <div style={{ width:12, height:NOTCH_H, background:bg, boxShadow:"-3px 0 10px rgba(0,0,0,0.18)" }} />
          <div style={{ width:CORNER_R, height:CORNER_R, background:"transparent", borderTopRightRadius:CORNER_R,
            boxShadow:`${CORNER_R/2}px -${CORNER_R/2}px 0 ${CORNER_R/2}px ${bg}`,
            filter:"drop-shadow(-2px 2px 4px rgba(0,0,0,0.12))" }} />
        </div>
      );
    }

    // ── Drag sort ───────────────────────────────────────────
    function useDragSort(items, onReorder) {
      const dragIdx = useRef(null), overIdx = useRef(null);
      const [dragging, setDragging] = useState(null);
      const [over, setOver] = useState(null);
      const onDragStart = (i) => (e) => { dragIdx.current=i; setDragging(i); e.dataTransfer.effectAllowed="move"; };
      const onDragEnter = (i) => (e) => { e.preventDefault(); overIdx.current=i; setOver(i); };
      const onDragOver  = (e) => { e.preventDefault(); e.dataTransfer.dropEffect="move"; };
      const onDrop = (e) => {
        e.preventDefault();
        const from=dragIdx.current, to=overIdx.current;
        if (from!==null && to!==null && from!==to) {
          const arr=[...items]; const [item]=arr.splice(from,1); arr.splice(to,0,item); onReorder(arr);
        }
        dragIdx.current=null; overIdx.current=null; setDragging(null); setOver(null);
      };
      const onDragEnd = () => { setDragging(null); setOver(null); };
      return { dragging, over, onDragStart, onDragEnter, onDragOver, onDrop, onDragEnd };
    }

    function useTouchSort(items, onReorder) {
      const state = useRef({ offsetY:0, idx:null, cloneEl:null, insertAt:null, containerRef:null });
      const [activeIdx, setActiveIdx] = useState(null);
      // insertAt is the slot (0..n) where the item will land — drives the live drop indicator.
      const [insertAt, setInsertAt] = useState(null);
      const onTouchStart = (i, containerRef) => (e) => {
        const touch=e.touches[0];
        // Clone the whole row (not just the grip) so the user sees what they're moving.
        const el=e.currentTarget.closest("[data-sortidx]") || e.currentTarget;
        const rect=el.getBoundingClientRect();
        const clone=el.cloneNode(true);
        clone.style.cssText=`position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;margin:0;opacity:0.95;z-index:9999;pointer-events:none;transform:scale(1.03);transition:none;box-shadow:0 12px 32px rgba(0,0,0,0.22);border-radius:16px;`;
        document.body.appendChild(clone);
        state.current={ offsetY:touch.clientY-rect.top, idx:i, cloneEl:clone, containerRef, insertAt:i };
        setActiveIdx(i); setInsertAt(i);
      };
      const onTouchMove = useCallback((e) => {
        const { cloneEl, offsetY, containerRef } = state.current;
        if (!cloneEl) return;
        e.preventDefault();
        const touch=e.touches[0];
        cloneEl.style.top=(touch.clientY-offsetY)+"px";
        if (!containerRef?.current) return;
        const children=Array.from(containerRef.current.children).filter(c=>c.dataset.sortidx!==undefined);
        // Insertion slot = number of rows whose midpoint sits above the finger.
        let slot=0;
        for (let c of children) { const r=c.getBoundingClientRect(); if (touch.clientY > r.top+r.height/2) slot++; }
        if (slot!==state.current.insertAt) { state.current.insertAt=slot; setInsertAt(slot); }
      }, []);
      const onTouchEnd = useCallback(() => {
        const { cloneEl, idx, insertAt:slot } = state.current;
        if (cloneEl) document.body.removeChild(cloneEl);
        if (idx!==null && slot!==null) {
          // Removing idx shifts later slots left by one.
          const to = slot>idx ? slot-1 : slot;
          if (to!==idx) { const arr=[...items]; const [item]=arr.splice(idx,1); arr.splice(to,0,item); onReorder(arr); }
        }
        state.current={ offsetY:0, idx:null, cloneEl:null, insertAt:null, containerRef:null };
        setActiveIdx(null); setInsertAt(null);
      }, [items, onReorder]);
      useEffect(() => {
        if (activeIdx!==null) {
          window.addEventListener("touchmove", onTouchMove, { passive:false });
          window.addEventListener("touchend", onTouchEnd);
        }
        return () => { window.removeEventListener("touchmove",onTouchMove); window.removeEventListener("touchend",onTouchEnd); };
      }, [activeIdx, onTouchMove, onTouchEnd]);
      return { activeIdx, insertAt, onTouchStart };
    }

    // Live drop indicator shown between rows while touch-sorting.
    function InsertLine({ color }) {
      return <div style={{height:3,borderRadius:2,background:color,margin:"-3px 4px",boxShadow:`0 0 8px ${color}`,flexShrink:0}}/>;
    }

    // ── Icons ───────────────────────────────────────────────
    function ChevR() {
      return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth="2.5" strokeLinecap="round" style={{flexShrink:0}}><path d="M9 18l6-6-6-6"/></svg>;
    }
    function DragHandle() {
      return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth="2" strokeLinecap="round" style={{flexShrink:0,opacity:0.4,cursor:"grab"}}><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>;
    }

    // ── Shared components ───────────────────────────────────
    function Modal({ children, onClose }) {
      return (
        <div style={s.overlay} onClick={onClose}>
          <div style={s.sheet} onClick={e=>e.stopPropagation()}>
            <div style={s.handle}/>{children}
          </div>
        </div>
      );
    }
    function Empty({ icon, text, hint }) {
      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"52px 16px",gap:6}}>
          {icon && <span style={{fontSize:40}}>{icon}</span>}
          <p style={sans({fontSize:15,color:C.inkLight,margin:0})}>{text}</p>
          {hint && <p style={sans({fontSize:13,color:C.inkLight,margin:0,opacity:0.7})}>{hint}</p>}
        </div>
      );
    }
    // Downscale + JPEG-compress in the browser so images don't blow past
    // Firestore's ~1 MB per-document limit (the whole cookbook is one doc).
    function compressImage(dataUrl, maxDim=1280, quality=0.7) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width >= height) { height = Math.round(height*maxDim/width); width = maxDim; }
            else { width = Math.round(width*maxDim/height); height = maxDim; }
          }
          try {
            const canvas = document.createElement("canvas");
            canvas.width = width; canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            const out = canvas.toDataURL("image/jpeg", quality);
            // Keep whichever is smaller (tiny PNGs can beat re-encoded JPEG).
            resolve(out.length < dataUrl.length ? out : dataUrl);
          } catch(e) { resolve(dataUrl); }
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }
    function ImagePicker({ image, onPick, onRemove }) {
      const ref = useRef();
      const handleFile = (e) => {
        const file=e.target.files?.[0]; if (!file) return;
        const reader=new FileReader();
        reader.onload=(ev)=>compressImage(ev.target.result).then(onPick);
        reader.readAsDataURL(file); e.target.value="";
      };
      return (
        <div style={{marginBottom:14}}>
          <label style={s.label}>Bilde (valgfritt)</label>
          {image ? (
            <div>
              <img src={image} alt="" style={s.imgPreview}/>
              <button style={s.imgRemoveBtn} onClick={onRemove}>✕ Fjern bilde</button>
            </div>
          ) : (
            <button style={s.imgPickBtn} onClick={()=>ref.current.click()}>
              <span style={{fontSize:22}}>📷</span>
              <span style={{fontSize:13,color:C.inkLight}}>Velg bilde fra fil eller bildebibliotek</span>
              <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
            </button>
          )}
        </div>
      );
    }
    function RecipeForm({ form, setForm, addType, setAddType, onSave, onBack, isEdit }) {
      const sf = (k) => (e) => setForm(f=>({...f,[k]:e.target.value}));
      return (
        <>
          {!isEdit && !addType && (
            <>
              <h2 style={s.sheetTitle}>Legg til oppskrift</h2>
              <p style={s.sheetSub}>Velg hvordan du vil legge den inn:</p>
              <div style={s.choiceRow}>
                <button style={s.choiceCard} onClick={()=>setAddType("link")}><span style={{fontSize:30}}>🔗</span><span style={s.choiceLabel}>Legg inn link</span></button>
                <button style={s.choiceCard} onClick={()=>setAddType("manual")}><span style={{fontSize:30}}>✏️</span><span style={s.choiceLabel}>Skriv manuelt</span></button>
              </div>
              <button style={s.ghostBtn} onClick={onBack}>Avbryt</button>
            </>
          )}
          {(addType==="link"||(isEdit&&form.type==="link")) && (
            <>
              {!isEdit && <button style={s.stepBack} onClick={()=>setAddType(null)}>← Tilbake</button>}
              <h2 style={s.sheetTitle}>{isEdit?"Rediger oppskrift":"Legg inn link"}</h2>
              <label style={s.label}>Tittel *</label>
              <input style={s.input} placeholder="Navn på oppskrift" value={form.title} onChange={sf("title")}/>
              <label style={s.label}>URL</label>
              <input style={s.input} placeholder="https://..." inputMode="url" value={form.url||""} onChange={sf("url")}/>
              <label style={s.label}>Beskrivelse (valgfritt)</label>
              <input style={s.input} placeholder="En setning om oppskriften" value={form.desc} onChange={sf("desc")}/>
              <ImagePicker image={form.image} onPick={img=>setForm(f=>({...f,image:img}))} onRemove={()=>setForm(f=>({...f,image:null,hasImage:false}))}/>
              <button style={{...s.saveBtn,opacity:form.title.trim()?1:0.45}} onClick={onSave}>{isEdit?"Lagre endringer":"Lagre oppskrift"}</button>
            </>
          )}
          {(addType==="manual"||(isEdit&&form.type==="manual")) && (
            <>
              {!isEdit && <button style={s.stepBack} onClick={()=>setAddType(null)}>← Tilbake</button>}
              <h2 style={s.sheetTitle}>{isEdit?"Rediger oppskrift":"Skriv manuelt"}</h2>
              <label style={s.label}>Tittel *</label>
              <input style={s.input} placeholder="Navn på oppskrift" value={form.title} onChange={sf("title")}/>
              <label style={s.label}>Beskrivelse (valgfritt)</label>
              <input style={s.input} placeholder="En kort beskrivelse" value={form.desc} onChange={sf("desc")}/>
              <label style={s.label}>Oppskrift</label>
              <textarea style={s.textarea} placeholder={"Ingredienser:\n– ...\n\nFremgangsmåte:\n1. ..."} value={form.content||""} onChange={sf("content")}/>
              <ImagePicker image={form.image} onPick={img=>setForm(f=>({...f,image:img}))} onRemove={()=>setForm(f=>({...f,image:null,hasImage:false}))}/>
              <button style={{...s.saveBtn,opacity:form.title.trim()?1:0.45}} onClick={onSave}>{isEdit?"Lagre endringer":"Lagre oppskrift"}</button>
            </>
          )}
        </>
      );
    }
    function SubMenu({ onEdit, onDelete }) {
      const [open, setOpen] = useState(false);
      return (
        <div style={{position:"relative"}}>
          <button style={s.dotBtn} onClick={e=>{e.stopPropagation();setOpen(v=>!v);}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth="2.5" strokeLinecap="round">
              <circle cx="12" cy="5" r="1.2" fill={C.inkLight}/><circle cx="12" cy="12" r="1.2" fill={C.inkLight}/><circle cx="12" cy="19" r="1.2" fill={C.inkLight}/>
            </svg>
          </button>
          {open && (
            <>
              <div style={s.menuOverlay} onClick={e=>{e.stopPropagation();setOpen(false);}}/>
              <div style={{...s.dropMenu,right:0,top:32,minWidth:160}}>
                <button style={s.dropItem} onClick={e=>{e.stopPropagation();setOpen(false);onEdit();}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.ink} strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  Endre navn
                </button>
                <div style={s.dropDivider}/>
                <button style={{...s.dropItem,color:C.red}} onClick={e=>{e.stopPropagation();setOpen(false);onDelete();}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.red} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                  Slett
                </button>
              </div>
            </>
          )}
        </div>
      );
    }
    function SubList({ subs, catColor, data, activeCat, onSwitch, onEdit, onDelete, onReorder }) {
      const containerRef = useRef();
      const { dragging:dDrag, over:dOver, onDragStart, onDragEnter, onDragOver, onDrop, onDragEnd } = useDragSort(subs, onReorder);
      const { activeIdx:tActive, insertAt:tInsert, onTouchStart } = useTouchSort(subs, onReorder);
      return (
        <div ref={containerRef} style={s.list}>
          {subs.map((sub,i) => {
            const count=data[activeCat].subcategories[sub]?.length||0;
            const isOver=dOver===i&&dDrag!==i, isDragging=dDrag===i||tActive===i;
            return (
              <React.Fragment key={sub}>
                {tActive!==null && tInsert===i && <InsertLine color={catColor}/>}
                <div data-sortidx={i} draggable
                  onDragStart={onDragStart(i)} onDragEnter={onDragEnter(i)} onDragOver={onDragOver} onDrop={onDrop} onDragEnd={onDragEnd}
                  style={{...s.subRow,opacity:isDragging?0.4:1,outline:isOver?`2px solid ${catColor}`:"none",transition:"opacity 0.15s,outline 0.1s"}}>
                  <div onTouchStart={onTouchStart(i,containerRef)} style={s.dragGrip}><DragHandle/></div>
                  <div style={{...s.subDot,background:catColor}}/>
                  <span style={s.subName} onClick={()=>onSwitch(sub)}>{sub}</span>
                  <span style={s.subCount} onClick={()=>onSwitch(sub)}>{count}</span>
                  <SubMenu onEdit={()=>onEdit(sub)} onDelete={()=>onDelete(sub)}/>
                  <span onClick={()=>onSwitch(sub)} style={{display:"flex",alignItems:"center"}}><ChevR/></span>
                </div>
              </React.Fragment>
            );
          })}
          {tActive!==null && tInsert===subs.length && <InsertLine color={catColor}/>}
        </div>
      );
    }
    function RecipeList({ recipes, onOpen, onReorder }) {
      const containerRef = useRef();
      const { dragging:dDrag, over:dOver, onDragStart, onDragEnter, onDragOver, onDrop, onDragEnd } = useDragSort(recipes, onReorder);
      const { activeIdx:tActive, insertAt:tInsert, onTouchStart } = useTouchSort(recipes, onReorder);
      return (
        <div ref={containerRef} style={s.list}>
          {recipes.map((r,i) => {
            const isOver=dOver===i&&dDrag!==i, isDragging=dDrag===i||tActive===i;
            return (
              <React.Fragment key={r.id}>
                {tActive!==null && tInsert===i && <InsertLine color={C.terra}/>}
                <div data-sortidx={i} draggable
                  onDragStart={onDragStart(i)} onDragEnter={onDragEnter(i)} onDragOver={onDragOver} onDrop={onDrop} onDragEnd={onDragEnd}
                  style={{...s.recipeRow,opacity:isDragging?0.4:1,outline:isOver?`2px solid ${C.terra}`:"none",transition:"opacity 0.15s,outline 0.1s"}}>
                  <div onTouchStart={onTouchStart(i,containerRef)} style={s.dragGrip}><DragHandle/></div>
                  <div style={{display:"flex",alignItems:"center",gap:12,flex:1,minWidth:0}} onClick={()=>onOpen(r)}>
                    {r.image ? <img src={r.image} alt="" style={s.thumb}/> : <div style={s.thumbFallback}>{r.type==="link"?"🔗":"📝"}</div>}
                    <div style={s.recipeInfo}>
                      <span style={s.recipeTitle}>{r.title}</span>
                      {r.desc && <span style={s.recipeDesc}>{r.desc}</span>}
                      <span style={s.recipeBadge}>{r.type==="link"?"Link":"Manuell"}</span>
                    </div>
                  </div>
                  <span onClick={()=>onOpen(r)} style={{display:"flex",alignItems:"center"}}><ChevR/></span>
                </div>
              </React.Fragment>
            );
          })}
          {tActive!==null && tInsert===recipes.length && <InsertLine color={C.terra}/>}
        </div>
      );
    }

    // ── Login screen ────────────────────────────────────────
    function LoginScreen({ onLogin, loading }) {
      return (
        <div style={{minHeight:"100dvh",background:"#efefef",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
          <div style={{marginBottom:32,textAlign:"center"}}>
            <div style={sans({fontSize:40,fontWeight:"800",color:"#6b4f3a",textShadow:"1px 2px 4px rgba(0,0,0,0.22), -1px -1px 2px rgba(255,255,255,0.45)",marginBottom:8})}>
              Min Kokebok
            </div>
            <div style={sans({fontSize:14,color:C.inkLight})}>Logg inn for å synkronisere på tvers av enheter</div>
          </div>
          <button style={sans({fontSize:16,fontWeight:"600",color:C.ink,cursor:"pointer",border:"none",borderRadius:16,padding:"16px 28px",background:"#efefef",boxShadow:NEU_UP,display:"flex",alignItems:"center",gap:12,opacity:loading?0.6:1})} onClick={onLogin} disabled={loading}>
            <svg width="22" height="22" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.33 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.58-13.47-8.91l-7.98 6.19C6.51 42.67 14.62 48 24 48z"/>
            </svg>
            {loading ? "Logger inn…" : "Logg inn med Google"}
          </button>
        </div>
      );
    }

    // ── Main App ────────────────────────────────────────────
    const EMPTY_FORM = { title:"", url:"", content:"", desc:"", image:null };
    const SIDEBAR_W  = 58;

    function App() {
      const [user,    setUser]    = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [loginLoading, setLoginLoading] = useState(false);
      const [data,    setData]    = useState(defaultData);
      const [syncing, setSyncing] = useState(false);
      const [syncError, setSyncError] = useState(null);
      const [activeCat, setActiveCat] = useState(CAT_ORDER[0]);
      const [activeSub, setActiveSub] = useState(null);
      const [activeRecipe, setActiveRecipe] = useState(null);
      const [slideIn, setSlideIn] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [showSearch,  setShowSearch]  = useState(false);
      const [showAdd,  setShowAdd]  = useState(false);
      const [addType,  setAddType]  = useState(null);
      const [addForm,  setAddForm]  = useState(EMPTY_FORM);
      const [showEdit, setShowEdit] = useState(false);
      const [editForm, setEditForm] = useState(EMPTY_FORM);
      const [confirmDelRecipe, setConfirmDelRecipe] = useState(null);
      const [showPanelMenu, setShowPanelMenu] = useState(false);
      const [showAddSub,  setShowAddSub]  = useState(false);
      const [newSubName,  setNewSubName]  = useState("");
      const [editSubOld,  setEditSubOld]  = useState(null);
      const [editSubName, setEditSubName] = useState("");
      const [confirmDelSub, setConfirmDelSub] = useState(null);
      const [contentFade, setContentFade] = useState(false);
      const [notchTopPx,  setNotchTopPx]  = useState(0);
      const searchRef = useRef(); const navRef = useRef(); const itemRefs = useRef({});
      const serverImages = useRef({});  // recipeId -> base64, mirror of the images subcollection
      const migratedRef = useRef(false);

      // Auth
      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => { setUser(u); setAuthReady(true); });
        return unsub;
      }, []);
      const handleLogin = async () => {
        setLoginLoading(true);
        try { await auth.signInWithPopup(gProvider); } catch(e) { console.error(e); }
        setLoginLoading(false);
      };
      const handleLogout = async () => { await auth.signOut(); serverImages.current={}; migratedRef.current=false; setData(defaultData); setActiveSub(null); };

      // Firestore
      useEffect(() => {
        if (!user) return;
        serverImages.current = {}; migratedRef.current = false;
        const ref = db.collection("kokeboker").doc(user.uid);
        const imgDoc = (id) => ref.collection("images").doc(String(id));
        let cancelled = false;

        const hydrate = async (d) => {
         try {
          // Structural fixes (legacy docs may miss subOrder, or carry old colors)
          let needsTextWrite = false;
          Object.keys(d).forEach(cat => {
            if (!d[cat].subOrder) { d[cat].subOrder = Object.keys(d[cat].subcategories); needsTextWrite = true; }
            if (defaultData[cat] && d[cat].color !== defaultData[cat].color) { d[cat].color = defaultData[cat].color; needsTextWrite = true; }
          });

          // ── Legacy migration: move inline base64 images into the subcollection ──
          const inline = collectImages(d);
          const hasInline = Object.keys(inline).some(id => (inline[id]||"").startsWith("data:"));
          if (hasInline && !migratedRef.current) {
            migratedRef.current = true;
            const ids = Object.keys(inline);
            for (let i=0; i<ids.length; i+=400) {
              const batch = db.batch();
              ids.slice(i,i+400).forEach(id => batch.set(imgDoc(id), { image: inline[id] }));
              await batch.commit();
            }
            Object.assign(serverImages.current, inline);
            await ref.set({ data: stripImages(d) });   // rewrite main doc without image bytes
            if (!cancelled) setData(mergeImages(stripImages(d), serverImages.current));
            return;
          }
          if (hasInline) { if (!cancelled) setData(d); return; }  // migration in flight; show inline meanwhile

          // ── Normal path: main doc is text-only with hasImage flags ──
          const referenced = new Set();
          const missing = [];
          Object.keys(d).forEach(cat => Object.values(d[cat].subcategories).forEach(list => list.forEach(r => {
            if (r.hasImage) { referenced.add(String(r.id)); if (!serverImages.current[String(r.id)]) missing.push(String(r.id)); }
          })));
          if (missing.length) {
            await Promise.all(missing.map(async id => {
              try { const s = await imgDoc(id).get(); if (s.exists) serverImages.current[id] = s.data().image; }
              catch(e) { console.error(e); }
            }));
          }
          // Drop cached images that are no longer referenced
          Object.keys(serverImages.current).forEach(id => { if (!referenced.has(id)) delete serverImages.current[id]; });

          const merged = mergeImages(d, serverImages.current);
          if (needsTextWrite) await ref.set({ data: stripImages(merged) });
          if (!cancelled) setData(merged);
         } catch(e) {
           console.error(e);
           if (!cancelled) setSyncError("Kunne ikke laste eller migrere bilder: " + (e?.message||"ukjent feil"));
         }
        };

        const unsub = ref.onSnapshot(snap => {
          if (snap.exists) { const d = snap.data().data; if (d) hydrate(d); }
          else { ref.set({ data: defaultData }); }
        });
        return () => { cancelled = true; unsub(); };
      }, [user]);

      const persist = async (newData) => {
        if (!user) return false;
        setSyncing(true); setSyncError(null);
        try {
          const ref = db.collection("kokeboker").doc(user.uid);
          const imgDoc = (id) => ref.collection("images").doc(String(id));
          const next = collectImages(newData), prev = serverImages.current;
          const batch = db.batch();
          // Only write images that are new or changed; delete those that were removed.
          Object.keys(next).forEach(id => { if (next[id] !== prev[id]) batch.set(imgDoc(id), { image: next[id] }); });
          Object.keys(prev).forEach(id => { if (!(id in next)) batch.delete(imgDoc(id)); });
          batch.set(ref, { data: stripImages(newData) });
          await batch.commit();
          serverImages.current = next;
          setSyncing(false); return true;
        } catch(e) {
          console.error(e);
          const tooBig = /longer than|exceeds the maximum|1048576|bytes/i.test(e?.message||"");
          setSyncError(tooBig
            ? "Bildet er for stort (over 1 MB selv etter komprimering). Prøv et mindre bilde."
            : ("Kunne ikke lagre: " + (e?.message || "ukjent feil")));
          setSyncing(false); return false;
        }
      };
      const updateData = (newData) => { setData(newData); return persist(newData); };

      // Notch
      const measureNotch = (cat) => {
        requestAnimationFrame(() => {
          const nav=navRef.current, btn=itemRefs.current[cat];
          if (!nav||!btn) return;
          const navTop=nav.getBoundingClientRect().top, r=btn.getBoundingClientRect();
          setNotchTopPx(r.top-navTop+r.height/2-NOTCH_H/2-CORNER_R);
        });
      };
      // Re-measure when the category changes AND when the sidebar first appears
      // (after auth), since activeCat doesn't change at that point.
      useEffect(() => { if (user && authReady) measureNotch(activeCat); }, [activeCat, user, authReady]);
      useEffect(() => {
        const onResize = () => measureNotch(activeCat);
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, [activeCat]);

      const switchCat = (cat) => {
        if (cat===activeCat) return;
        measureNotch(cat); setContentFade(true);
        setTimeout(() => { setActiveCat(cat); setActiveSub(null); setContentFade(false); }, 140);
      };
      const switchSub = (sub) => { setContentFade(true); setTimeout(() => { setActiveSub(sub); setContentFade(false); }, 140); };
      const openRecipe = (r) => { setActiveRecipe(r); setSlideIn(false); setShowPanelMenu(false); requestAnimationFrame(() => requestAnimationFrame(() => setSlideIn(true))); };
      const closeRecipe = () => { setSlideIn(false); setShowPanelMenu(false); setTimeout(() => setActiveRecipe(null), 340); };

      // Recipe CRUD
      const saveAdd = async () => {
        if (!addForm.title.trim()) return;
        const recipe = { id:Date.now(), title:addForm.title.trim(), type:addType, url:addType==="link"?addForm.url.trim():null, content:addType==="manual"?addForm.content.trim():null, desc:addForm.desc.trim(), image:addForm.image||null };
        const d={...data}; d[activeCat].subcategories[activeSub]=[...(d[activeCat].subcategories[activeSub]||[]),recipe];
        // Only close/clear if the write actually reached the server, so a failed save isn't lost.
        if (await updateData(d)) { setShowAdd(false); setAddType(null); setAddForm(EMPTY_FORM); }
      };
      const saveEdit = async () => {
        if (!editForm.title.trim()) return;
        const updated={...editForm,title:editForm.title.trim(),desc:editForm.desc.trim()};
        const d={...data}; d[activeCat].subcategories[activeSub]=d[activeCat].subcategories[activeSub].map(r=>r.id===updated.id?updated:r);
        if (await updateData(d)) { setActiveRecipe(updated); setShowEdit(false); }
      };
      const doDelRecipe = (id) => { const d={...data}; d[activeCat].subcategories[activeSub]=d[activeCat].subcategories[activeSub].filter(r=>r.id!==id); updateData(d); setConfirmDelRecipe(null); closeRecipe(); };
      const reorderRecipes = (newList) => { const d={...data}; d[activeCat].subcategories[activeSub]=newList; updateData(d); };

      // Sub CRUD
      const saveAddSub = () => {
        const name=newSubName.trim(); if (!name||data[activeCat].subcategories[name]) return;
        const d={...data}; d[activeCat].subcategories[name]=[]; d[activeCat].subOrder=[...(d[activeCat].subOrder||[]),name];
        updateData(d); setShowAddSub(false); setNewSubName("");
      };
      const saveEditSub = () => {
        const newName=editSubName.trim(); if (!newName||!editSubOld) return;
        if (newName===editSubOld) { setEditSubOld(null); return; }
        if (data[activeCat].subcategories[newName]) return;
        const d={...data}, recipes=d[activeCat].subcategories[editSubOld];
        delete d[activeCat].subcategories[editSubOld];
        d[activeCat].subcategories[newName]=recipes;
        d[activeCat].subOrder=d[activeCat].subOrder.map(s=>s===editSubOld?newName:s);
        updateData(d); setEditSubOld(null); setEditSubName("");
      };
      const doDelSub = (sub) => {
        const d={...data}; delete d[activeCat].subcategories[sub]; d[activeCat].subOrder=d[activeCat].subOrder.filter(s=>s!==sub);
        updateData(d); setConfirmDelSub(null); if (activeSub===sub) setActiveSub(null);
      };
      const reorderSubs = (newOrder) => { const d={...data}; d[activeCat].subOrder=newOrder; updateData(d); };

      // Search
      const allRecipes = () => { const out=[]; CAT_ORDER.filter(cat=>data[cat]).forEach(cat=>{const cv=data[cat];Object.entries(cv.subcategories).forEach(([sub,list])=>list.forEach(r=>out.push({...r,_cat:cat,_sub:sub})))}); return out; };
      const searchResults = searchQuery.trim() ? allRecipes().filter(r=>r.title.toLowerCase().includes(searchQuery.toLowerCase())||(r.desc&&r.desc.toLowerCase().includes(searchQuery.toLowerCase()))) : [];

      const catColor   = data[activeCat]?.color||"#555";
      const subs       = activeCat ? (data[activeCat].subOrder||Object.keys(data[activeCat].subcategories)) : [];
      const recipes    = activeSub ? (data[activeCat]?.subcategories[activeSub]||[]) : [];
      const totalInCat = activeCat ? Object.values(data[activeCat].subcategories).reduce((a,b)=>a+b.length,0) : 0;

      if (!authReady) return <div style={{minHeight:"100dvh",background:"#efefef",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={sans({fontSize:15,color:C.inkLight})}>Laster…</div></div>;
      if (!user) return <LoginScreen onLogin={handleLogin} loading={loginLoading}/>;

      return (
        <div style={s.root}>
          {/* SIDEBAR */}
          <aside style={{...s.sidebar,background:catColor}}>
            <div style={s.sideTop}>
              {user.photoURL && (
                <button onClick={handleLogout} title="Logg ut" style={{background:"none",border:"none",cursor:"pointer",padding:0}}>
                  <img src={user.photoURL} alt="avatar" style={{width:32,height:32,borderRadius:"50%",opacity:0.85}}/>
                </button>
              )}
            </div>
            <nav ref={navRef} style={s.sideNav}>
              <NotchMarker topPx={notchTopPx} bg={C.bg}/>
              {CAT_ORDER.filter(cat => data[cat]).map((cat) => {
                const isActive=cat===activeCat;
                return (
                  <button key={cat} ref={el=>{itemRefs.current[cat]=el;}} style={s.sideItem} onClick={()=>switchCat(cat)}>
                    <span style={{...s.sideLabel,color:isActive?"#fff":"rgba(255,255,255,0.45)",fontWeight:isActive?"700":"400"}}>{cat}</span>
                  </button>
                );
              })}
            </nav>
            <div style={s.sideBottom}>
              <button style={s.homeBtn} onClick={()=>{switchCat(CAT_ORDER[0]);setActiveSub(null);}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="1.8" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </button>
            </div>
          </aside>

          {/* MAIN */}
          <div style={s.mainPanel}>
            {syncing && <div style={{position:"absolute",top:12,right:60,zIndex:10,...sans({fontSize:11,color:C.inkLight,opacity:0.7})}}>Lagrer…</div>}
            {syncError && (
              <div style={{margin:"12px 18px 0",padding:"12px 14px",borderRadius:12,background:"#fdecea",border:`1px solid ${C.red}`,display:"flex",alignItems:"flex-start",gap:10}}>
                <span style={{fontSize:16,lineHeight:1.2}}>⚠️</span>
                <span style={sans({flex:1,fontSize:13,color:C.red,lineHeight:1.4})}>{syncError}</span>
                <button style={sans({background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"0 2px"})} onClick={()=>setSyncError(null)}>✕</button>
              </div>
            )}
            <div style={s.topBar}>
              <div style={s.topBarLeft}>
                {activeSub ? (
                  <button style={s.backChip} onClick={()=>switchSub(null)}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth="2.5" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
                    {activeCat}
                  </button>
                ) : (
                  <span style={s.superTitle}>{totalInCat} oppskrifter</span>
                )}
              </div>
              <button style={s.searchToggle} onClick={()=>{setShowSearch(v=>!v);setTimeout(()=>searchRef.current?.focus(),80);}}>
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </button>
            </div>
            <div style={s.pageTitleBar}>
              <div>
                {activeSub && <div style={s.superLabel}>{activeCat}</div>}
                <h1 style={{...s.pageH1,color:catColor,textShadow:"1px 2px 4px rgba(0,0,0,0.22), -1px -1px 2px rgba(255,255,255,0.45)"}}>{activeSub||activeCat}</h1>
              </div>
            </div>
            {showSearch && (
              <div style={s.searchBar}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth="2.2" strokeLinecap="round" style={{flexShrink:0}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input ref={searchRef} style={s.searchInput} placeholder="Søk i alle oppskrifter…" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}/>
                {searchQuery && <button style={s.searchClear} onClick={()=>setSearchQuery("")}>✕</button>}
              </div>
            )}
            <div style={{...s.content,opacity:contentFade?0:1,transition:"opacity 0.14s"}}>
              {showSearch && searchQuery.trim() ? (
                <div style={s.list}>
                  {searchResults.length===0 ? <Empty icon="🔍" text="Ingen treff."/> : searchResults.map(r=>(
                    <div key={r.id} style={s.recipeRow} onClick={()=>{setActiveCat(r._cat);setActiveSub(r._sub);openRecipe(r);}}>
                      {r.image?<img src={r.image} alt="" style={s.thumb}/>:<div style={s.thumbFallback}>{r.type==="link"?"🔗":"📝"}</div>}
                      <div style={s.recipeInfo}><span style={s.recipeTitle}>{r.title}</span>{r.desc&&<span style={s.recipeDesc}>{r.desc}</span>}<span style={s.recipeBreadcrumb}>{r._cat} › {r._sub}</span></div>
                      <ChevR/>
                    </div>
                  ))}
                </div>
              ) : !activeSub ? (
                <>
                  <SubList subs={subs} catColor={catColor} data={data} activeCat={activeCat}
                    onSwitch={switchSub} onEdit={sub=>{setEditSubOld(sub);setEditSubName(sub);}} onDelete={sub=>setConfirmDelSub(sub)} onReorder={reorderSubs}/>
                  {subs.length===0 && <Empty text="Ingen underkategorier." hint="Trykk + for å legge til!"/>}
                </>
              ) : (
                recipes.length===0 ? <Empty text="Ingen oppskrifter ennå." hint="Trykk + for å legge til!"/> : <RecipeList recipes={recipes} onOpen={openRecipe} onReorder={reorderRecipes}/>
              )}
            </div>
            {(!showSearch||!searchQuery.trim()) && (
              <button style={{...s.fab,background:catColor}} onClick={()=>activeSub?setShowAdd(true):setShowAddSub(true)}>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            )}
          </div>

          {/* RECIPE PANEL */}
          {activeRecipe && (
            <div style={{...s.panel,transform:slideIn?"translateX(0)":"translateX(100%)"}}>
              <header style={s.panelHeader}>
                <button style={s.iconBtn} onClick={closeRecipe}><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth="2.5" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
                <span style={s.panelTitle}>{activeRecipe.title}</span>
                <button style={s.iconBtn} onClick={()=>setShowPanelMenu(v=>!v)}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth="2.5" strokeLinecap="round"><circle cx="12" cy="5" r="1.2" fill={C.inkLight}/><circle cx="12" cy="12" r="1.2" fill={C.inkLight}/><circle cx="12" cy="19" r="1.2" fill={C.inkLight}/></svg>
                </button>
              </header>
              {showPanelMenu && (
                <>
                  <div style={s.menuOverlay} onClick={()=>setShowPanelMenu(false)}/>
                  <div style={s.dropMenu}>
                    <button style={s.dropItem} onClick={()=>{setEditForm({...activeRecipe});setShowEdit(true);setShowPanelMenu(false);}}>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={C.ink} strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      Rediger oppskrift
                    </button>
                    <div style={s.dropDivider}/>
                    <button style={{...s.dropItem,color:C.red}} onClick={()=>{setConfirmDelRecipe(activeRecipe.id);setShowPanelMenu(false);}}>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={C.red} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                      Slett oppskrift
                    </button>
                  </div>
                </>
              )}
              {activeRecipe.image && <div style={s.heroWrap}><img src={activeRecipe.image} alt={activeRecipe.title} style={s.heroImg}/></div>}
              <div style={s.panelBody}>
                {activeRecipe.type==="link" ? (
                  <>{activeRecipe.desc&&<p style={s.panelDesc}>{activeRecipe.desc}</p>}
                    <a href={activeRecipe.url} target="_blank" rel="noreferrer" style={{...s.openLinkBtn,background:catColor}}>Åpne oppskrift →</a>
                    <div style={s.iframeBox}><iframe src={activeRecipe.url} title={activeRecipe.title} style={s.iframe} sandbox="allow-scripts allow-same-origin allow-popups allow-forms"/></div>
                  </>
                ) : (
                  <>{activeRecipe.desc&&<p style={s.panelDesc}>{activeRecipe.desc}</p>}<pre style={s.recipeText}>{activeRecipe.content}</pre></>
                )}
              </div>
            </div>
          )}

          {/* MODALS */}
          {showAdd && <Modal onClose={()=>{setShowAdd(false);setAddType(null);setAddForm(EMPTY_FORM);}}><RecipeForm form={addForm} setForm={setAddForm} addType={addType} setAddType={setAddType} onSave={saveAdd} onBack={()=>{setShowAdd(false);setAddType(null);setAddForm(EMPTY_FORM);}} isEdit={false}/></Modal>}
          {showEdit && <Modal onClose={()=>setShowEdit(false)}><button style={s.stepBack} onClick={()=>setShowEdit(false)}>← Avbryt</button><RecipeForm form={editForm} setForm={setEditForm} addType={editForm.type} setAddType={()=>{}} onSave={saveEdit} onBack={()=>setShowEdit(false)} isEdit={true}/></Modal>}
          {confirmDelRecipe && (
            <Modal onClose={()=>setConfirmDelRecipe(null)}>
              <div style={{textAlign:"center",padding:"8px 0 20px"}}><span style={{fontSize:42}}>🗑️</span><h2 style={{...s.sheetTitle,textAlign:"center",marginTop:10}}>Slett oppskrift?</h2><p style={{...s.sheetSub,textAlign:"center"}}>«{activeRecipe?.title}» vil bli slettet permanent.</p></div>
              <button style={{...s.saveBtn,background:C.red,marginBottom:10}} onClick={()=>doDelRecipe(confirmDelRecipe)}>Ja, slett oppskriften</button>
              <button style={s.ghostBtn} onClick={()=>setConfirmDelRecipe(null)}>Avbryt</button>
            </Modal>
          )}
          {showAddSub && (
            <Modal onClose={()=>{setShowAddSub(false);setNewSubName("");}}>
              <h2 style={s.sheetTitle}>Ny underkategori</h2><p style={s.sheetSub}>Under {activeCat}</p>
              <label style={s.label}>Navn *</label>
              <input style={s.input} placeholder="F.eks. «Pastaretter»" value={newSubName} onChange={e=>setNewSubName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveAddSub()} autoFocus/>
              <button style={{...s.saveBtn,opacity:newSubName.trim()?1:0.45}} onClick={saveAddSub}>Legg til underkategori</button>
              <button style={{...s.ghostBtn,marginTop:10}} onClick={()=>{setShowAddSub(false);setNewSubName("");}}>Avbryt</button>
            </Modal>
          )}
          {editSubOld && (
            <Modal onClose={()=>setEditSubOld(null)}>
              <h2 style={s.sheetTitle}>Endre navn</h2>
              <label style={s.label}>Nytt navn *</label>
              <input style={s.input} value={editSubName} onChange={e=>setEditSubName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEditSub()} autoFocus/>
              <button style={{...s.saveBtn,opacity:editSubName.trim()?1:0.45}} onClick={saveEditSub}>Lagre nytt navn</button>
              <button style={{...s.ghostBtn,marginTop:10}} onClick={()=>setEditSubOld(null)}>Avbryt</button>
            </Modal>
          )}
          {confirmDelSub && (
            <Modal onClose={()=>setConfirmDelSub(null)}>
              <div style={{textAlign:"center",padding:"8px 0 20px"}}><span style={{fontSize:42}}>🗑️</span><h2 style={{...s.sheetTitle,textAlign:"center",marginTop:10}}>Slett underkategori?</h2><p style={{...s.sheetSub,textAlign:"center"}}>«{confirmDelSub}» og alle {data[activeCat]?.subcategories[confirmDelSub]?.length||0} oppskrifter slettes permanent.</p></div>
              <button style={{...s.saveBtn,background:C.red,marginBottom:10}} onClick={()=>doDelSub(confirmDelSub)}>Ja, slett underkategorien</button>
              <button style={s.ghostBtn} onClick={()=>setConfirmDelSub(null)}>Avbryt</button>
            </Modal>
          )}
        </div>
      );
    }
